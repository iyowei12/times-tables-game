<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">九九乘法大挑戰 Icon</title>
  <defs>
    <!-- Background gradient from favicon -->
    <linearGradient id="bg" x1="80" y1="64" x2="432" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67C8FF" />
      <stop offset="1" stop-color="#35B98B" />
    </linearGradient>
  </defs>

  <!-- Box match with favicon -->
  <rect x="48" y="48" width="416" height="416" rx="128" fill="url(#bg)" />
  <rect x="48" y="48" width="416" height="416" rx="128" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-opacity="0.85" />

  <!-- 
    Cuter fonts with rounded edges. Added Windows-native rounded alternatives in case Baloo isn't globally installed
    Increased horizontal spacing significantly to avoid touching.
  -->
  <g font-family="'Baloo 2', 'Arial Rounded MT Bold', 'Comic Sans MS', 'Nunito', 'Quicksand', sans-serif" font-weight="900" text-anchor="middle">
    <!-- Left 9 -->
    <text x="130" y="325" font-size="200" fill="#FFFDF8">9</text>
    
    <!-- Multiplication sign (Yellow) -->
    <text x="256" y="315" font-size="160" fill="#FFDF76">×</text>
    
    <!-- Right 9 -->
    <text x="382" y="325" font-size="200" fill="#FFFDF8">9</text>
  </g>
</svg>
